version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gokick-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gokick}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gokick-network

  redis:
    image: redis:7-alpine
    container_name: gokick-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gokick-network

  gokick:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gokick-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GONIO_ENV: prod
      GONIO_SERVER_PORT: 8080
      GONIO_MYSQL_HOST: mysql
      GONIO_MYSQL_PORT: 3306
      GONIO_MYSQL_USERNAME: root
      GONIO_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      GONIO_MYSQL_DATABASE: ${MYSQL_DATABASE:-gokick}
      GONIO_REDIS_ADDR: redis:6379
      GONIO_JWT_SECRET: ${JWT_SECRET:-gokick-prod-secret-change-me}
      GONIO_LOG_MODE: prod
      GONIO_LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gokick-network

networks:
  gokick-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
