server:
  port: ${SERVER_PORT}
  mode: release
  read_timeout: 10s
  write_timeout: 10s
  auto_migrate: false

mysql:
  host: ${MYSQL_HOST}
  port: 3306
  username: ${MYSQL_USERNAME}
  password: ${MYSQL_PASSWORD}
  database: ${MYSQL_DATABASE}
  max_idle_conns: 50
  max_open_conns: 500
  max_lifetime: 3600s
  conn_max_idle_time: 600s
  dial_timeout: 5s
  read_timeout: 10s
  write_timeout: 10s
  ping_timeout: 3s
  prepare_stmt: true
  skip_default_transaction: true

redis:
  addr: ${REDIS_ADDR}
  password: ${REDIS_PASSWORD}
  db: 0
  pool_size: 500
  min_idle_conns: 50
  max_idle_conns: 250
  pool_timeout: 5s
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  conn_max_idle_time: 300s
  conn_max_lifetime: 3600s
  ping_timeout: 3s
  max_retries: 5
  min_retry_backoff: 8ms
  max_retry_backoff: 512ms

jwt:
  secret: ${JWT_SECRET}
  expire: "604800s"

log:
  mode: prod
  level: warn
  sql_level: error
  file_path: logs/app.log
  max_size: 200
  max_backups: 30
  max_age: 90
  compress: true

smtp:
  host: smtp.example.com
  port: 465
  username: no-reply@example.com
  password: ""
  from: no-reply@example.com
  tls: true
